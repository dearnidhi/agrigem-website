<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd9a0"/>
      <stop offset="45%" stop-color="#ffb27a"/>
      <stop offset="100%" stop-color="#fde8c8"/>
    </linearGradient>
    <radialGradient id="sun1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="60%" stop-color="#ffca4a"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#sky1)"/>
  <circle cx="800" cy="520" r="170" fill="url(#sun1)" opacity="0.95"/>

  <!-- birds -->
  <g stroke="#5d4037" stroke-width="4" fill="none" opacity="0.6">
    <path d="M250,180 q15,-18 30,0 q15,-18 30,0"/>
    <path d="M340,230 q12,-14 24,0 q12,-14 24,0"/>
    <path d="M1200,160 q15,-18 30,0 q15,-18 30,0"/>
  </g>

  <!-- distant tree line -->
  <path d="M0,560 C150,520 300,545 450,530 C600,515 750,545 900,525 C1050,510 1200,540 1350,520 C1450,510 1550,525 1600,518 L1600,600 L0,600 Z" fill="#5a3d1f" opacity="0.5"/>

  <!-- rolling field bands -->
  <path d="M0,640 C300,590 700,590 1000,630 C1250,665 1450,635 1600,610 L1600,900 L0,900 Z" fill="#1b5e20"/>
  <path d="M0,690 C320,650 680,650 1000,685 C1260,715 1460,690 1600,670 L1600,900 L0,900 Z" fill="#2e7d32"/>
  <path d="M0,745 C320,715 680,715 1000,745 C1260,770 1460,750 1600,735 L1600,900 L0,900 Z" fill="#558b2f"/>
  <path d="M0,800 C320,780 680,780 1000,800 C1260,815 1460,805 1600,798 L1600,900 L0,900 Z" fill="#9e9d24"/>
  <path d="M0,855 C320,845 680,845 1000,852 C1260,858 1460,855 1600,852 L1600,900 L0,900 Z" fill="#d4b85a"/>
</svg>
